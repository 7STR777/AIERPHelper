services:
  qdrant:
    image: qdrant/qdrant:v1.13.4
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  rag-api:
    build: .
    depends_on:
      - qdrant
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      COLLECTION_NAME: new_rag_collection
      EMBEDDING_MODEL: BAAI/bge-m3
      EMBEDDING_DEVICE: cuda
      MISTRAL_MODEL_PATH: /models/mistral-7b-instruct-v0.3-q4_k_m.gguf
      LLM_GPU_LAYERS: -1
      LLM_N_CTX: 4096
    ports:
      - "8000:8000"
    volumes:
      - ./rag_test/models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
